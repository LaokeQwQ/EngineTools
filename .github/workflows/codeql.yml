# Advanced CodeQL setup for a Windows-only Wails/Go app.
# Default setup runs on Linux (GOOS=linux), which cannot import
# golang.org/x/sys/windows and Windows-only syscall APIs.
name: "CodeQL"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "27 3 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # Go: must run on Windows so x/sys/windows and syscall Win32 APIs resolve.
          - language: go
            os: windows-latest
            build-mode: autobuild
          - language: javascript-typescript
            os: ubuntu-latest
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
